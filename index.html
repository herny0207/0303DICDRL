<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林秉翰 | 個人網頁</title>
    <meta name="description" content="林秉翰的個人網頁 - 展示現代設計風格與即時時間。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Caveat:wght@400;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-container">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <main class="hero">
        <div class="container">
            <header class="top-nav">
                <div class="badge-pill">PERSONAL PAGE</div>
                <div class="time-container">
                    <span id="current-time" class="time-text">00:00:00</span>
                </div>
            </header>

            <section class="banner">
                <div class="intro-wrap">
                    <span class="script-font">Hello, I am</span>
                    <h1 class="main-name">林秉翰</h1>
                    <div class="tags">
                        <div class="tag-pill accent">CREATIVE</div>
                        <div class="tag-pill">PASSIONATE</div>
                    </div>
                </div>

                <!-- Decorative Stars -->
                <div class="star star-1">
                    <svg viewBox="0 0 100 100">
                        <path d="M50 0 L58 42 L100 50 L58 58 L50 100 L42 58 L0 50 L42 42 Z" fill="currentColor"/>
                    </svg>
                </div>
                <div class="star star-2">
                    <svg viewBox="0 0 100 100">
                        <path d="M50 0 L58 42 L100 50 L58 58 L50 100 L42 58 L0 50 L42 42 Z" fill="currentColor"/>
                    </svg>
                </div>
            </section>

            <footer class="bottom-info">
                <div class="location">
                    <p>BASED IN TAIWAN</p>
                </div>
                <div class="social-links">
                    <a href="#" class="link">INSTAGRAM</a>
                    <a href="#" class="link">TWITTER</a>
                </div>
            </footer>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
